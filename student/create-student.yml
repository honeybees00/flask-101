info:
  name: create-student
  type: http

http:
  method: POST
  url: http://127.0.0.1:5000/students
  body:
    type: json
    data: |-
      {
        "name":"christina",
        "grade":"A",
        "age":68
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
